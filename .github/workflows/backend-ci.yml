name: backend-ci

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./vireon_ci.db
      REDIS_URL: redis://localhost:6379/0
      USE_LOCAL_LLM: "false"
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_agent.txt

      - name: Run startup/bootstrap tests
        run: pytest tests/test_startup_bootstrap.py -q

      - name: Run dashboard API tests
        run: pytest tests/test_dashboard_api.py -q

      - name: Run readiness and agent quality regression tests
        run: |
          if [ -n "$GROQ_API_KEY" ]; then
            pytest tests/test_health_readiness.py tests/test_agent_response_evaluator.py -q
          else
            echo "GROQ_API_KEY not set — skipping agent tests"
            pytest tests/test_health_readiness.py -q
          fi

      - name: Run full backend test suite
        run: |
          if [ -n "$GROQ_API_KEY" ]; then
            pytest tests -q
          else
            pytest tests -q --ignore=tests/test_agent_response_evaluator.py
          fi
