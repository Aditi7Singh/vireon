name: Build & Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options: [prod, staging]

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: vireon

jobs:
  # ─── Build & Push Images ──────────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      environment: ${{ steps.env.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment name
        id: env
        run: echo "name=${{ github.event.inputs.environment || 'prod' }}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build & push backend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          DEPLOY_ENV: ${{ steps.env.outputs.name }}
        run: |
          REPO=$ECR_REGISTRY/${{ env.PROJECT_NAME }}-${DEPLOY_ENV}-backend
          docker build -t $REPO:$IMAGE_TAG ./backend
          docker push $REPO:$IMAGE_TAG
          docker tag $REPO:$IMAGE_TAG $REPO:latest
          docker push $REPO:latest

      - name: Build & push frontend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          DEPLOY_ENV: ${{ steps.env.outputs.name }}
        run: |
          REPO=$ECR_REGISTRY/${{ env.PROJECT_NAME }}-${DEPLOY_ENV}-frontend
          docker build -f frontend/Dockerfile.prod -t $REPO:$IMAGE_TAG ./frontend
          docker push $REPO:$IMAGE_TAG
          docker tag $REPO:$IMAGE_TAG $REPO:latest
          docker push $REPO:latest

  # ─── Run DB Migrations ────────────────────────────────────────────────────
  migrate:
    name: Run Alembic Migrations
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run migrations via ECS task
        env:
          DEPLOY_ENV: ${{ needs.build.outputs.environment }}
        run: |
          CLUSTER=${{ env.PROJECT_NAME }}-${DEPLOY_ENV}-cluster
          TASK_DEF=${{ env.PROJECT_NAME }}-${DEPLOY_ENV}-backend

          # Get network config from existing backend service
          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster $CLUSTER \
            --services ${{ env.PROJECT_NAME }}-${DEPLOY_ENV}-backend \
            --query 'services[0].networkConfiguration' \
            --output json)

          # Run one-off migration task
          TASK_ARN=$(aws ecs run-task \
            --cluster $CLUSTER \
            --task-definition $TASK_DEF \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIG" \
            --overrides '{"containerOverrides":[{"name":"backend","command":["alembic","upgrade","head"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster $CLUSTER --tasks $TASK_ARN

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster $CLUSTER \
            --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrations completed successfully"

  # ─── Deploy Services ──────────────────────────────────────────────────────
  deploy:
    name: Deploy ECS Services
    runs-on: ubuntu-latest
    needs: [build, migrate]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS services
        env:
          DEPLOY_ENV: ${{ needs.build.outputs.environment }}
        run: |
          CLUSTER=${{ env.PROJECT_NAME }}-${DEPLOY_ENV}-cluster
          for SERVICE in backend frontend worker beat; do
            echo "Deploying $SERVICE..."
            aws ecs update-service \
              --cluster $CLUSTER \
              --service ${{ env.PROJECT_NAME }}-${DEPLOY_ENV}-$SERVICE \
              --force-new-deployment \
              --query 'service.serviceName' \
              --output text
          done

      - name: Wait for backend to stabilize
        env:
          DEPLOY_ENV: ${{ needs.build.outputs.environment }}
        run: |
          CLUSTER=${{ env.PROJECT_NAME }}-${DEPLOY_ENV}-cluster
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services ${{ env.PROJECT_NAME }}-${DEPLOY_ENV}-backend
          echo "Backend deployed successfully"
