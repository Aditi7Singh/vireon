# Fly.io app configuration for Vireon Backend
# ============================================
# Deploy with: fly launch (or use the github workflow below)
# Requires: fly auth login, fly orgs, fly apps create
# Free tier includes: 3 shared-cpu-1x VMs (256MB RAM each), 3GB persistent volume

app = "vireon-backend"  # Change to your app name
primary_region = "iad"   # Primary region: iad (US East), lhr (London), fra (Frankfurt)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"      # Stop when idle (free tier friendly)
  auto_start_machines = true        # Auto-start on request
  min_machines_running = 0          # Scale to zero when idle
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "5s"
    method = "GET"
    path = "/health/ready"

  [[http_service.checks]]
    interval = "20s"
    timeout = "10s"
    grace_period = "10s"
    method = "GET"
    path = "/health/live"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[env]
  ENVIRONMENT = "production"
  BACKEND_URL = "https://vireon-backend.fly.dev"
  PORT = "8000"
  GROQ_API_KEY = ""
  USE_LOCAL_LLM = "false"
  OLLAMA_BASE_URL = "http://ollama:11434"
  OLLAMA_MODEL_FAST = "llama3.1:8b"
  OLLAMA_MODEL_THINK = "qwen2.5:14b"
  ALLOWED_ORIGINS = "https://vireon-frontend.vercel.app,http://localhost:3000"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  processes = ["app"]

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
