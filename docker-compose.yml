services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vireon
      POSTGRES_USER: vireon
      POSTGRES_PASSWORD: vireon123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vireon -d vireon"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 8

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      - MH_MAILDIR_PATH=/maildir
      - MH_STORAGE=maildir

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://vireon:vireon123@postgres:5432/vireon
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_URL=http://backend:8000
      - USE_LOCAL_LLM=false
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  worker:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql://vireon:vireon123@postgres:5432/vireon
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_URL=http://backend:8000
      - USE_LOCAL_LLM=false
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: celery -A anomaly.celery_app worker -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql://vireon:vireon123@postgres:5432/vireon
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_URL=http://backend:8000
      - USE_LOCAL_LLM=false
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: celery -A anomaly.celery_app beat -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
