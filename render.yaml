databases:
  - name: vireon-db
    databaseName: vireon
    user: vireon_user

services:
  - type: redis
    name: vireon-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: vireon-backend
    runtime: python
    rootDir: backend
    plan: free
    healthCheckPath: /health/ready
    buildCommand: pip install -r requirements.txt -r requirements_agent.txt && alembic upgrade head && python emergency_migrations.py || true
    startCommand: python emergency_migrations.py && uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: vireon-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vireon-redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: ""
      - key: SECRET_KEY
        value: ""
      - key: GROQ_API_KEY
        value: ""
      - key: OPENAI_API_KEY
        value: ""
      - key: MERGE_API_KEY
        value: ""
      - key: MERGE_SECRET_KEY
        value: ""
      - key: ERPNEXT_URL
        value: ""
      - key: REQUIRE_REDIS_FOR_READINESS
        value: "false"
    numInstances: 1
