services:
  - type: web
    name: vireon-backend
    runtime: python
    plan: standard
    buildCommand: |
      pip install -r requirements.txt -r requirements_agent.txt &&
      alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: vireon-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vireon-redis
          type: redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        scope: all
        value: ""  # Set to your Vercel frontend URL, e.g., https://yourdomain.vercel.app
      - key: GROQ_API_KEY
        scope: all
        value: ""  # Set your Groq API key
      - key: SECRET_KEY
        scope: all
        value: ""  # Set a secure random key
      - key: OPENAI_API_KEY
        scope: all
        value: ""  # Optional: Set your OpenAI API key if needed
      - key: MERGE_API_KEY
        scope: all
        value: ""  # Optional: Set if using Merge.dev
      - key: MERGE_SECRET_KEY
        scope: all
        value: ""  # Optional: Set if using Merge.dev
      - key: ERPNEXT_URL
        scope: all
        value: ""  # Optional: Set if integrating with ERPNext
      - key: REQUIRE_REDIS_FOR_READINESS
        value: "true"
    healthCheck:
      path: /health/live
      checkIntervalSeconds: 10
      timeoutSeconds: 5
    maxInstanceCount: 3
    minInstanceCount: 1
    disk:
      name: data
      sizeGB: 5
    previewPlan: standard

  - type: pserv
    name: vireon-db
    runtime: postgres
    plan: standard
    ipAllowList: []
    maxInstanceCount: 1
    minInstanceCount: 1
    disk:
      name: postgres-data
      sizeGB: 10
    envVars:
      - key: POSTGRES_DB
        value: vireon
      - key: POSTGRES_USER
        value: vireon_user

  - type: redis
    name: vireon-redis
    plan: standard
    ipAllowList: []
    maxInstanceCount: 1
    minInstanceCount: 1
